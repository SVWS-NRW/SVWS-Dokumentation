<svg xmlns="http://www.w3.org/2000/svg" width="920" height="100" viewBox="0 0 920 100" role="img" aria-labelledby="title desc">
  <title id="title">SVWS Konferenzübersicht (schmal)</title>
  <desc id="desc">Kompakte Variante des Logos mit Kachel-Icon und einzeiligem Schriftzug mit Umlaut</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F3D3E"/>
      <stop offset="100%" stop-color="#1E6F6B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7B32B"/>
      <stop offset="100%" stop-color="#F28F3B"/>
    </linearGradient>
  </defs>

  <g transform="translate(0 0)">
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="80" height="80" rx="12" fill="url(#bg)"/>
      <rect x="14" y="14" width="18" height="18" rx="4" fill="#E8F5F4"/>
      <rect x="48" y="14" width="18" height="18" rx="4" fill="#BFE7E4"/>
      <rect x="14" y="48" width="18" height="18" rx="4" fill="#BFE7E4"/>
      <rect x="48" y="48" width="18" height="18" rx="4" fill="#E8F5F4"/>
      <circle cx="40" cy="40" r="10" fill="url(#accent)"/>
      <path d="M34 40 L38 44 L46 36" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(96 24)">
      <text x="0" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#0F3D3E">SVWS Konferenzübersicht</text>
    </g>
  </g>
</svg>
